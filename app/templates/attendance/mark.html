{% extends "base.html" %}
{% block title %}Mark Attendance{% endblock %}
{% block page_title %}Mark Attendance{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h5 class="mb-1 text-heading" style="font-weight:700;">Mark Attendance</h5>
        <p class="text-muted mb-0" style="font-size:0.85rem;">Record attendance for students</p>
    </div>
    <a href="/attendance" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-2"></i>Back</a>
</div>

<div class="card">
    <div class="card-body">
        <form id="attendanceForm" onsubmit="submitAttendance(event)">
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <label class="form-label">Subject</label>
                    <select class="form-select" id="subject_id" name="subject_id" required>
                        <option value="">Select subject</option>
                        {% for subject in subjects %}
                        <option value="{{ subject.id }}">{{ subject.name }} ({{ subject.code }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Date</label>
                    <input type="date" class="form-control" id="att_date" name="date" value="{{ today }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">&nbsp;</label>
                    <button type="button" class="btn btn-outline-primary w-100" onclick="loadStudents()">
                        <i class="bi bi-search me-2"></i>Load Students
                    </button>
                </div>
            </div>

            <div id="studentList">
                <div class="empty-state">
                    <i class="bi bi-people"></i>
                    <p>Select a subject and click "Load Students" to begin</p>
                </div>
            </div>

            <div id="submitBtnContainer" class="d-none mt-4">
                <button type="submit" class="btn btn-primary btn-lg"><i class="bi bi-check-lg me-2"></i>Submit Attendance</button>
            </div>
        </form>
    </div>
</div>

<script>
async function loadStudents() {
    const subjectId = document.getElementById('subject_id').value;
    if (!subjectId) { showFlash('Please select a subject', 'warning'); return; }

    try {
        const res = await fetch(`/api/subjects/${subjectId}/students`);
        if (!res.ok) {
            document.getElementById('studentList').innerHTML = '<div class="empty-state"><i class="bi bi-exclamation-triangle"></i><p>Could not load students. The API endpoint may not be available yet.</p></div>';
            return;
        }
        const students = await res.json();
        if (!students.length) {
            document.getElementById('studentList').innerHTML = '<div class="empty-state"><i class="bi bi-people"></i><p>No students found for this subject</p></div>';
            return;
        }

        let html = '<div class="table-responsive"><table class="table table-hover"><thead><tr><th>Student</th><th>Enrollment</th><th>Status</th></tr></thead><tbody>';
        students.forEach(s => {
            html += `<tr>
                <td>${s.full_name || s.name || 'N/A'}</td>
                <td><code>${s.enrollment_number || ''}</code></td>
                <td>
                    <select name="status_${s.id}" class="form-select form-select-sm" style="width:130px;">
                        <option value="present" selected>Present</option>
                        <option value="absent">Absent</option>
                        <option value="late">Late</option>
                    </select>
                </td>
            </tr>`;
        });
        html += '</tbody></table></div>';
        document.getElementById('studentList').innerHTML = html;
        document.getElementById('submitBtnContainer').classList.remove('d-none');
    } catch (e) {
        document.getElementById('studentList').innerHTML = '<div class="empty-state"><i class="bi bi-exclamation-triangle"></i><p>Connection error loading students</p></div>';
    }
}

async function submitAttendance(e) {
    e.preventDefault();
    showFlash('Attendance marking feature coming soon with API integration', 'info');
}
</script>
{% endblock %}
