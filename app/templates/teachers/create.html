{% extends "base.html" %}
{% block title %}Add Teacher{% endblock %}
{% block page_title %}Add New Teacher{% endblock %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <form id="createTeacherForm" onsubmit="handleCreate(event, '/api/teachers', '/teachers')">
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label">Full Name</label><input type="text" class="form-control" name="full_name" required></div>
                <div class="col-md-6"><label class="form-label">Email</label><input type="email" class="form-control" name="email" required></div>
                <div class="col-md-6"><label class="form-label">Username</label><input type="text" class="form-control" name="username" required></div>
                <div class="col-md-6"><label class="form-label">Password</label><input type="password" class="form-control" name="password" value="teacher123" required></div>
                <div class="col-md-6"><label class="form-label">Employee ID</label><input type="text" class="form-control" value="Auto-generated" disabled></div>
                <div class="col-md-6">
                    <label class="form-label">Department</label>
                    <select class="form-select" name="department_id" required>
                        <option value="">Select Department</option>
                        {% for dept in departments %}<option value="{{ dept.id }}">{{ dept.name }}</option>{% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Designation</label>
                    <select class="form-select" name="designation">
                        <option value="">Select Designation</option>
                        <option value="HOD">HOD</option>
                        <option value="Professor">Professor</option>
                        <option value="Assistant Professor">Assistant Professor</option>
                        <option value="Associate Professor">Associate Professor</option>
                    </select>
                </div>
                <div class="col-md-6"><label class="form-label">Specialization</label><input type="text" class="form-control" name="specialization"></div>
                <div class="col-md-6"><label class="form-label">Qualification</label><input type="text" class="form-control" name="qualification"></div>
                <div class="col-md-6"><label class="form-label">Experience (years)</label><input type="number" class="form-control" name="experience_years" value="0"></div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-2"></i>Create Teacher</button>
                <a href="/teachers" class="btn btn-outline-secondary ms-2">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
