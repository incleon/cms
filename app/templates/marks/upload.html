{% extends "base.html" %}
{% block title %}Upload Marks{% endblock %}
{% block page_title %}Upload Marks{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h5 class="mb-1 text-heading" style="font-weight:700;">Upload Marks</h5>
        <p class="text-muted mb-0" style="font-size:0.85rem;">Enter marks for students</p>
    </div>
    <a href="/marks" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-2"></i>Back</a>
</div>

<div class="card">
    <div class="card-body">
        <form id="marksForm" onsubmit="submitMarks(event)">
            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <label class="form-label">Subject</label>
                    <select class="form-select" id="subject_id" name="subject_id" required>
                        <option value="">Select subject</option>
                        {% for subject in subjects %}
                        <option value="{{ subject.id }}">{{ subject.name }} ({{ subject.code }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Exam Type</label>
                    <select class="form-select" id="exam_type" name="exam_type" required>
                        <option value="">Select type</option>
                        <option value="midterm">Midterm</option>
                        <option value="final">Final</option>
                        <option value="quiz">Quiz</option>
                        <option value="assignment">Assignment</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Max Marks</label>
                    <input type="number" class="form-control" id="max_marks" value="100" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">&nbsp;</label>
                    <button type="button" class="btn btn-outline-primary w-100" onclick="loadStudentsForMarks()">
                        <i class="bi bi-search me-2"></i>Load Students
                    </button>
                </div>
            </div>

            <div id="studentList">
                <div class="empty-state">
                    <i class="bi bi-pencil-square"></i>
                    <p>Select subject and exam type, then click "Load Students"</p>
                </div>
            </div>

            <div id="submitBtnContainer" class="d-none mt-4">
                <button type="submit" class="btn btn-primary btn-lg"><i class="bi bi-check-lg me-2"></i>Submit Marks</button>
            </div>
        </form>
    </div>
</div>

<script>
async function loadStudentsForMarks() {
    const subjectId = document.getElementById('subject_id').value;
    if (!subjectId) { showFlash('Please select a subject', 'warning'); return; }

    try {
        const res = await fetch(`/api/subjects/${subjectId}/students`);
        if (!res.ok) {
            document.getElementById('studentList').innerHTML = '<div class="empty-state"><i class="bi bi-exclamation-triangle"></i><p>Could not load students. API endpoint may not be available.</p></div>';
            return;
        }
        const students = await res.json();
        if (!students.length) {
            document.getElementById('studentList').innerHTML = '<div class="empty-state"><i class="bi bi-people"></i><p>No students found for this subject</p></div>';
            return;
        }
        const maxMarks = document.getElementById('max_marks').value || 100;
        let html = '<div class="table-responsive"><table class="table table-hover"><thead><tr><th>Student</th><th>Enrollment</th><th>Marks (out of ' + maxMarks + ')</th></tr></thead><tbody>';
        students.forEach(s => {
            html += `<tr>
                <td>${s.full_name || s.name || 'N/A'}</td>
                <td><code>${s.enrollment_number || ''}</code></td>
                <td><input type="number" name="marks_${s.id}" class="form-control form-control-sm" style="width:100px;" min="0" max="${maxMarks}" placeholder="0"></td>
            </tr>`;
        });
        html += '</tbody></table></div>';
        document.getElementById('studentList').innerHTML = html;
        document.getElementById('submitBtnContainer').classList.remove('d-none');
    } catch (e) {
        document.getElementById('studentList').innerHTML = '<div class="empty-state"><i class="bi bi-exclamation-triangle"></i><p>Connection error</p></div>';
    }
}

async function submitMarks(e) {
    e.preventDefault();
    showFlash('Marks upload feature coming soon with API integration', 'info');
}
</script>
{% endblock %}
