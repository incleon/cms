{% extends "base.html" %}
{% block title %}Add Student{% endblock %}
{% block page_title %}Add New Student{% endblock %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <form id="createStudentForm" onsubmit="handleCreateStudent(event)">
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label">Full Name</label><input type="text" class="form-control" name="full_name" required></div>
                <div class="col-md-6"><label class="form-label">Email</label><input type="email" class="form-control" name="email" required></div>
                <div class="col-md-6"><label class="form-label">Username</label><input type="text" class="form-control" name="username" required></div>
                <div class="col-md-6"><label class="form-label">Password</label><input type="password" class="form-control" name="password" value="student123" required></div>
                <div class="col-md-6"><label class="form-label">Enrollment Number</label><input type="text" class="form-control" name="enrollment_number" required></div>
                <div class="col-md-6">
                    <label class="form-label">Department</label>
                    <select class="form-select" name="department_id" required>
                        <option value="">Select Department</option>
                        {% for dept in departments %}<option value="{{ dept.id }}">{{ dept.name }}</option>{% endfor %}
                    </select>
                </div>
                <div class="col-md-4"><label class="form-label">Phone</label><input type="text" class="form-control" name="phone"></div>
                <div class="col-md-4"><label class="form-label">Semester</label><input type="number" class="form-control" name="semester" value="1" min="1" max="8"></div>
                <div class="col-md-4"><label class="form-label">Section</label><input type="text" class="form-control" name="section" value="A"></div>
                <div class="col-md-4"><label class="form-label">Guardian Name</label><input type="text" class="form-control" name="guardian_name"></div>
                <div class="col-md-4"><label class="form-label">Guardian Phone</label><input type="text" class="form-control" name="guardian_phone"></div>
                <div class="col-md-4"><label class="form-label">Blood Group</label><input type="text" class="form-control" name="blood_group"></div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-2"></i>Create Student</button>
                <a href="/students" class="btn btn-outline-secondary ms-2">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script>
async function handleCreateStudent(e) {
    e.preventDefault();
    const form = e.target;
    const data = Object.fromEntries(new FormData(form));
    data.department_id = parseInt(data.department_id);
    data.semester = parseInt(data.semester || 1);

    try {
        const res = await fetch('/api/students', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data),
        });
        if (res.ok) { window.location.href = '/students'; }
        else {
            const err = await res.json();
            showFlash(err.detail || 'Failed to create student', 'danger');
        }
    } catch(e) { showFlash('Connection error', 'danger'); }
}
</script>
{% endblock %}
