{% extends "base.html" %}
{% block title %}Add Department{% endblock %}
{% block page_title %}Add Department{% endblock %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <form onsubmit="handleCreate(event, '/api/departments', '/departments')">
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label">Name</label><input type="text" class="form-control" name="name" required></div>
                <div class="col-md-6"><label class="form-label">Code</label><input type="text" class="form-control" name="code" required></div>
                <div class="col-12"><label class="form-label">Description</label><textarea class="form-control" name="description" rows="3"></textarea></div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-2"></i>Create</button>
                <a href="/departments" class="btn btn-outline-secondary ms-2">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
